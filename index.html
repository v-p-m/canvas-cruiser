<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Canvas Cruiser</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #111;
                overflow: hidden;
            }
            canvas {
                display: block;
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                background: #222;
            }
        </style>
    </head>
    <body>
        <canvas id="gameCanvas"></canvas>

        <script src="track.js"></script>
        <script src="ai.js"></script>
        <script src="startLights.js"></script>
        <script src="waypointEditor.js"></script>
        <script src="debugHUD.js"></script>
        <script src="debugConfig.js"></script>
        <script src="game.js"></script>

        <script>
            window.addEventListener("load", () => {
                document.title = `Canvas Cruiser ${GAME_VERSION}`;
            });
        </script>
    </body>
</html>
