<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Canvas Cruiser</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <!-- No more <h1> or <p> tags here -->
        <canvas id="gameCanvas"></canvas>
        <script src="track.js"></script>
        <script src="ai.js"></script>
        <script src="startLights.js"></script>
        <script src="waypointEditor.js"></script>
        <script src="game.js"></script>
        <div id="ui">
            <h1>Canvas Cruiser</h1>
            <p>Use Arrow Keys to drive</p>
            <small id="version-display">Loading...</small>
        </div>
        <script>
            // After scripts load, pull the version from game.js
            window.addEventListener("load", () => {
                document.getElementById("version-display").innerText =
                    `${GAME_VERSION}`;
            });
        </script>
    </body>
</html>
